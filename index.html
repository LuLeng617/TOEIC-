<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC必考單字與片語</title>
<style>
:root {
  --primary: #2563eb;
  --star: #f1c40f;
  --bg: #f1f5f9;
  --text: #1e293b;
}
body {
  font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
  background-color: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 12px;
}
.container {
  max-width: 1250px;
  margin: auto;
  background: white;
  padding: 18px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* 頂部控制區 */
.header {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 10px;
}
.header h1 {
  font-size: 20px;
  margin: 0;
}

/* 課程下拉式選單 */
.unit-select-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 13px;
  color: #64748b;
}
.unit-select-row select {
  padding: 6px 8px;
  border-radius: 999px;
  border: 1px solid #e2e8f0;
  background: #f8fafc;
  font-size: 13px;
  color: #334155;
}

/* 控制列 */
.controls {
  display: flex;
  gap: 8px;
  width: 100%;
  margin-top: 6px;
  flex-wrap: wrap;
}
input#searchInput {
  flex-grow: 1;
  min-width: 160px;
  padding: 8px 10px;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  outline: none;
  transition: 0.3s;
  font-size: 13px;
}
input#searchInput:focus {
  border-color: var(--primary);
}
.btn {
  padding: 6px 10px;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  white-space: nowrap;
}
.btn-filter {
  background-color: white;
  border: 2px solid #e2e8f0;
  color: #64748b;
}
.btn-filter.active {
  background-color: var(--star);
  color: #856404;
  border-color: #f1c40f;
}
.btn-add {
  background-color: #10b981;
  color: white;
}
.btn-reset {
  background-color: #fee2e2;
  color: #ef4444;
}
.btn-hide {
  background-color: #e0f2fe;
  color: #0369a1;
}
.btn-quiz {
  background-color: #f97316;
  color: white;
}

/* 範圍控制區 */
.range-controls {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: #64748b;
}
.range-controls input {
  width: 52px;
  padding: 3px 5px;
  border-radius: 6px;
  border: 1px solid #e2e8f0;
  font-size: 11px;
}

/* 表格樣式：縮小高度 */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th {
  background-color: #f8fafc;
  padding: 8px 6px;
  text-align: left;
  border-bottom: 2px solid #e2e8f0;
  color: #64748b;
}
td {
  padding: 6px 6px;
  border-bottom: 1px solid #f1f5f9;
  vertical-align: top;
}
tr:hover {
  background-color: #fdfdfd;
}

/* 單字與收藏：縮小間距 */
.word-box {
  display: flex;
  align-items: center;
  gap: 6px;
}
.star-icon {
  cursor: pointer;
  font-size: 1.1rem;
  color: #cbd5e1;
  transition: 0.2s;
  user-select: none;
}
.star-icon.active {
  color: var(--star);
}
.word-text {
  font-weight: 800;
  color: #2563eb;
  font-size: 1.05rem;
}

/* 詞性 + 中文定義同一塊，減少高度 */
.word-meta {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
}
.pos-tag {
  padding: 1px 4px;
  border-radius: 4px;
  font-size: 0.7rem;
  color: white;
  background: #94a3b8;
  font-weight: bold;
}
.pos-n { background: #f59e0b; }
.pos-v { background: #3b82f6; }
.pos-a { background: #10b981; }

/* 發音按鈕縮小 */
.audio-btn {
  background: #f1f5f9;
  border: none;
  border-radius: 50%;
  width: 26px;
  height: 26px;
  cursor: pointer;
  color: #2563eb;
  font-size: 0.8rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.audio-btn:hover {
  background: #2563eb;
  color: white;
}

/* 例句區：更緊湊 */
.examples-box {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.example-en {
  font-style: italic;
  color: #475569;
  display: block;
  cursor: pointer;
}
.example-ch {
  color: #94a3b8;
  font-size: 0.85rem;
  display: block;
  cursor: pointer;
}

/* 遮住文字 */
.hidden-text {
  background: #cbd5e1;
  color: #cbd5e1;
  border-radius: 4px;
  padding: 0 3px;
}
.hidden-text.reveal {
  color: inherit;
}

/* 手機：每個單字變成卡片，但高度壓縮 */
@media (max-width: 900px) {
  .container {
    padding: 12px;
  }
  th:nth-child(2),
  th:nth-child(3) {
    display: none;
  }
  table, thead {
    display: block;
  }
  tr {
    display: block;
    border-bottom: 4px solid #f1f5f9;
    padding: 6px 0;
  }
  td {
    display: block;
    border: none;
    padding: 2px 0;
  }
  td:nth-child(1) {
    font-size: 12px;
    color: #94a3b8;
  }
}

/* 抽考模式提示 */
.quiz-badge {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 999px;
  background: #ffedd5;
  color: #c05621;
  font-size: 10px;
  margin-left: 4px;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>TOEIC必考單字與片語</h1>

    <!-- 課程下拉式選單 -->
    <div class="unit-select-row">
      <span>課程：</span>
      <select id="unitSelect" onchange="switchUnitSelect()">
        <!-- 用 JS 填入 Unit 1~13 -->
      </select>
      <span id="quizInfo" style="font-size:11px; color:#f97316; display:none;">
        抽考中
      </span>
    </div>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="搜尋單字、中文..." onkeyup="render()">
      <button id="filterBtn" class="btn btn-filter" onclick="toggleFilter()">⭐ 收藏</button>
      <button class="btn btn-add" onclick="manualAdd()">＋ 新增</button>
      <button class="btn btn-reset" onclick="resetData()">還原單元</button>
      <button id="hideWordBtn" class="btn btn-hide" onclick="toggleHideWord()">🙈 單字</button>
      <button id="hideDefBtn" class="btn btn-hide" onclick="toggleHideDef()">🙈 中文</button>
      <button id="hideChBtn" class="btn btn-hide" onclick="toggleHideCh()">🙈 中例句</button>
      <button class="btn btn-quiz" onclick="startQuiz()">🎲 抽考</button>
      <div class="range-controls">
        <span>顯示第</span>
        <input type="number" id="rangeStart" min="1" value="1" onchange="render()">
        <span>到</span>
        <input type="number" id="rangeEnd" min="1" value="999" onchange="render()">
        <span>筆</span>
      </div>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th width="6%">#</th>
        <th width="17%">單字</th>
        <th width="10%">詞性</th>
        <th width="20%">中文定義</th>
        <th width="42%">例句 (中英對照)</th>
        <th width="5%"></th>
      </tr>
    </thead>
    <tbody id="vocabBody"></tbody>
  </table>
</div>

    { word: "bonus", pos: "n.", chinese: "獎金；額外好處", exampleEn: "The job is great, and the bonus is even better.", exampleCh: "工作很棒，獎金更棒。", favorite: false },
    { word: "capability", pos: "n.", chinese: "能力；才幹", exampleEn: "We finally have the capability to do the job properly.", exampleCh: "我們終於有能力妥善完成這項工作。", favorite: false },
    { word: "capable", pos: "adj.", chinese: "有能力的", exampleEn: "She is capable of judging works of art.", exampleCh: "她有能力鑑賞藝術品。", favorite: false },
    { word: "caution", pos: "n.", chinese: "謹慎；小心", exampleEn: "Just a word of caution - cheaper models aren't worth it.", exampleCh: "提醒一下：廉價型號不值得買。", favorite: false },
    { word: "circumstance", pos: "n.", chinese: "情況；境遇", exampleEn: "She coped very well under the circumstances.", exampleCh: "她在這種情況下應付得很好。", favorite: false },
    { word: "collaborate", pos: "v.", chinese: "合作；協作", exampleEn: "A German company collaborated with a Swiss firm.", exampleCh: "一家德國公司與一家瑞士公司合作。", favorite: false },
    { word: "collaboration", pos: "n.", chinese: "合作；協作", exampleEn: "The airport is a collaboration between two architects.", exampleCh: "這座機場是兩位建築師的合作成果。", favorite: false },
    { word: "combination", pos: "n.", chinese: "混合；結合", exampleEn: "This drug can be used in combination with others.", exampleCh: "這種藥物可以與其他藥物合用。", favorite: false },
    { word: "combine", pos: "v.", chinese: "結合；聯合", exampleEn: "Some films combine education with recreation.", exampleCh: "有些電影將教育與娛樂結合。", favorite: false },
    { word: "committee", pos: "n.", chinese: "委員會", exampleEn: "The finance committee controls the school's budget.", exampleCh: "財務委員會控制學校預算。", favorite: false },
    { word: "compete", pos: "v.", chinese: "競爭", exampleEn: "It's difficult for a small store to compete.", exampleCh: "小店很難參與競爭。", favorite: false },
    { word: "competition", pos: "n.", chinese: "比賽；競爭", exampleEn: "Competition for jobs is intense.", exampleCh: "求職競爭非常激烈。", favorite: false },
    { word: "competitive", pos: "adj.", chinese: "競爭的", exampleEn: "Acting is very competitive.", exampleCh: "演藝圈的競爭非常激烈。", favorite: false },
    { word: "competitor", pos: "n.", chinese: "競爭者", exampleEn: "Their prices are better than their competitors.", exampleCh: "他們的價格比競爭對手更好。", favorite: false },
    { word: "component", pos: "n.", chinese: "零件；成分", exampleEn: "Inflation control is a key component of policy.", exampleCh: "控制通膨是政策的核心組成部分。", favorite: false },
    { word: "comprehensive", pos: "adj.", chinese: "廣泛的；綜合的", exampleEn: "We offer comprehensive training.", exampleCh: "我們提供全面的培訓。", favorite: false },
    { word: "comprehensively", pos: "adv.", chinese: "全面地", exampleEn: "The plan was comprehensively rejected.", exampleCh: "該計畫被全面否決了。", favorite: false },
    { word: "compromise", pos: "n./v.", chinese: "妥協；折衷", exampleEn: "A 4% pay rise was agreed in a compromise.", exampleCh: "經妥協後達成加薪 4% 的協議。", favorite: false },
    { word: "concede", pos: "v.", chinese: "承認；讓步", exampleEn: "The government conceded the policy was a disaster.", exampleCh: "政府承認該政策是一場災難。", favorite: false },
    { word: "concession", pos: "n.", chinese: "認可；讓步", exampleEn: "Both sides made concessions in the talks.", exampleCh: "雙方在談判中都做了讓步。", favorite: false },
    { word: "consolidate", pos: "v.", chinese: "鞏固；合併", exampleEn: "The success consolidated the firm's position.", exampleCh: "這次成功鞏固了公司的地位。", favorite: false },
    { word: "consolidation", pos: "n.", chinese: "鞏固；加強", exampleEn: "The company is entering a period of consolidation.", exampleCh: "公司正進入鞏固期。", favorite: false },
    { word: "constructive", pos: "adj.", chinese: "建設性的", exampleEn: "He put forward a constructive suggestion.", exampleCh: "他提出了一個建設性的建議。", favorite: false },

    { word: "contribution", pos: "n.", chinese: "貢獻；捐助", exampleEn: "He doesn't make much contribution to the company.", exampleCh: "他對公司沒什麼貢獻。", favorite: false },
    { word: "contributor", pos: "n.", chinese: "捐獻者；貢獻者", exampleEn: "Older people are contributors to the economy.", exampleCh: "老人是經濟的重要貢獻者。", favorite: false },
    { word: "cooperate", pos: "v.", chinese: "合作；配合", exampleEn: "The two companies cooperated in joint ventures.", exampleCh: "兩家公司在合資企業中合作。", favorite: false },
    { word: "cooperation", pos: "n.", chinese: "合作；協助", exampleEn: "The company produces computers in cooperation with others.", exampleCh: "該公司與其他公司合作生產電腦。", favorite: false }

  2: [],
  3: [],
  4: [],
  5: [],

  13: []

// ====== 2. 狀態 & localStorage ======
let currentUnit = 1;
let vocabs = loadUnitData(currentUnit);
let onlyShowFavorites = false;
let hideWord = false;
let hideDef = false;
let hideChinese = false;

// 抽考模式
let quizMode = false;
let quizList = []; // 抽出來要考的那幾題（存的是 vocabs 的 index）

function unitKey(unit) {
  return `myVocabDB_v4_unit_${unit}`;
}
function loadUnitData(unit) {
  const key = unitKey(unit);
  const saved = localStorage.getItem(key);
  if (saved) {
    try {
      return JSON.parse(saved);
    } catch (e) {
      return [...(unitDefaults[unit] || [])];
    }
  }
  return [...(unitDefaults[unit] || [])];
}
function save() {
  const key = unitKey(currentUnit);
  localStorage.setItem(key, JSON.stringify(vocabs));
  render();
}

// ====== 3. 課程下拉式選單 UI ======
const unitSelect = document.getElementById('unitSelect');
function initUnitSelect() {
  let html = '';
  for (let i = 1; i <= 13; i++) {
    html += `<option value="${i}">Unit ${i}</option>`;
  }
  unitSelect.innerHTML = html;
  unitSelect.value = String(currentUnit);
}
function switchUnitSelect() {
  const unit = parseInt(unitSelect.value, 10);
  if (unit === currentUnit) return;
  currentUnit = unit;
  vocabs = loadUnitData(currentUnit);
  onlyShowFavorites = false;
  document.getElementById('filterBtn').classList.remove('active');
  document.getElementById('filterBtn').textContent = "⭐ 收藏";
  document.getElementById('rangeStart').value = 1;
  document.getElementById('rangeEnd').value = 999;
  // 離開抽考模式
  quizMode = false;
  quizList = [];
  document.getElementById('quizInfo').style.display = 'none';
  render();
}

// ====== 4. 控制按鈕 ======
function toggleFilter() {
  onlyShowFavorites = !onlyShowFavorites;
  const btn = document.getElementById('filterBtn');
  if (onlyShowFavorites) {
    btn.classList.add('active');
    btn.textContent = "★ 收藏中";
  } else {
    btn.classList.remove('active');
    btn.textContent = "⭐ 收藏";
  }
  render();
}
function toggleHideWord() {
  hideWord = !hideWord;
  const btn = document.getElementById('hideWordBtn');
  btn.textContent = hideWord ? "👀 單字" : "🙈 單字";
  render();
}
function toggleHideDef() {
  hideDef = !hideDef;
  const btn = document.getElementById('hideDefBtn');
  btn.textContent = hideDef ? "👀 中文" : "🙈 中文";
  render();
}
function toggleHideCh() {
  hideChinese = !hideChinese;
  const btn = document.getElementById('hideChBtn');
  btn.textContent = hideChinese ? "👀 中例句" : "🙈 中例句";
  render();
}

// ====== 5. 抽考模式 ======
function startQuiz() {
  const total = vocabs.length;
  if (!total) {
    alert("這個單元還沒有單字。");
    return;
  }
  let n = prompt(`要抽幾題？（1～${total}）`, "10");
  if (!n) return;
  n = parseInt(n, 10);
  if (isNaN(n) || n <= 0) return;
  if (n > total) n = total;

  // 抽 n 個不重複 index
  const allIndex = [...Array(total).keys()]; // 0..total-1
  for (let i = allIndex.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allIndex[i], allIndex[j]] = [allIndex[j], allIndex[i]];
  }
  quizList = allIndex.slice(0, n);
  quizMode = true;
  document.getElementById('quizInfo').style.display = 'inline';
  // 自動把範圍調整成全部顯示
  document.getElementById('rangeStart').value = 1;
  document.getElementById('rangeEnd').value = 999;
  render();
}

// ====== 6. 渲染表格（含編號＋範圍＋抽考） ======
function render() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const body = document.getElementById('vocabBody');
  const rangeStart = parseInt(document.getElementById('rangeStart').value || '1', 10);
  const rangeEnd = parseInt(document.getElementById('rangeEnd').value || '999', 10);

  // 基本搜尋＋收藏過濾
  let filtered = vocabs
    .map((v, i) => ({ ...v, _index: i }))
    .filter((v) => {
      const matchesSearch =
        v.word.toLowerCase().includes(query) ||
        (v.chinese || "").includes(query);
      const matchesFilter = onlyShowFavorites ? v.favorite : true;
      return matchesSearch && matchesFilter;
    });

  // 若在抽考模式：只保留 quizList 內的 index
  if (quizMode && quizList.length) {
    const set = new Set(quizList);
    filtered = filtered.filter(v => set.has(v._index));
  }

  const total = filtered.length;
  const startIndex = Math.max(1, rangeStart);
  const endIndex = Math.min(rangeEnd, total);
  const sliced = filtered.slice(startIndex - 1, endIndex);

  body.innerHTML = sliced.map((item, idx) => {
    const globalIndex = startIndex + idx;
    const posClass = item.pos ? `pos-${item.pos.charAt(0).toLowerCase()}` : 'pos-a';

    // 單字
    const wordContent = hideWord
      ? `<span class="word-text hidden-text" data-full="${item.word}">點一下顯示</span>`
      : `<span class="word-text" data-full="${item.word}">${item.word}</span>`;

    // 詞性＋中文同一格
    const defContent = hideDef
      ? `<span class="hidden-text" data-full="${item.chinese || ''}">點一下顯示</span>`
      : `<span data-full="${item.chinese || ''}">${item.chinese || ''}</span>`;

    const chText = hideChinese
      ? `<span class="example-ch hidden-text" data-full="${item.exampleCh || ''}">點一下顯示中例句</span>`
      : `<span class="example-ch" data-full="${item.exampleCh || ''}">${item.exampleCh || ''}</span>`;

    const enText = `<span class="example-en" data-full="${item.exampleEn || ''}">${item.exampleEn || ''}</span>`;

    const safeWord = (item.word || '').replace(/'/g, "\\'");
    const safeExampleEn = (item.exampleEn || '').replace(/'/g, "\\'");

    // 若在抽考模式，可以在編號旁邊加一個小標示
    const quizBadge = quizMode ? `<span class="quiz-badge">Quiz</span>` : "";

    return `
      <tr>
        <td>${globalIndex}${quizBadge}</td>
        <td>
          <div class="word-box">
            <span class="star-icon ${item.favorite ? 'active' : ''}" onclick="toggleStarByWord('${safeWord}')">★</span>
            <button class="audio-btn" onclick="speak('${safeWord}', 0.8)">🔊</button>
            ${wordContent}
          </div>
        </td>
        <td colspan="2">
          <div class="word-meta">
            <span class="pos-tag ${posClass}">${item.pos || ''}</span>
            ${defContent}
          </div>
        </td>
        <td>
          <div style="display:flex; gap:6px; align-items:flex-start;">
            <button class="audio-btn" onclick="speak('${safeExampleEn}', 0.9)">🔊</button>
            <div class="examples-box">
              ${enText}
              ${chText}
            </div>
          </div>
        </td>
        <td>
          <button style="border:none; background:none; cursor:pointer; color:#d1d5db;" onclick="deleteByWord('${safeWord}')">🗑️</button>
        </td>
      </tr>
    `;
  }).join('');

  // 點被隱藏的文字時切換顯示/隱藏
  body.querySelectorAll('.hidden-text, .word-text, td span, .example-en, .example-ch').forEach(span => {
    const hasData = span.getAttribute('data-full') !== null;
    if (!hasData) return;
    span.addEventListener('click', () => {
      const full = span.getAttribute('data-full') || '';
      if (span.classList.contains('hidden-text')) {
        span.classList.remove('hidden-text');
        span.classList.add('reveal');
        span.textContent = full;
      } else if (span.classList.contains('reveal')) {
        span.classList.add('hidden-text');
        span.classList.remove('reveal');
        if (span.classList.contains('example-ch')) {
          span.textContent = '點一下顯示中例句';
        } else if (span.closest('td') && span.closest('td').cellIndex === 1) {
          span.textContent = '點一下顯示';
        } else {
          span.textContent = '點一下顯示';
        }
      }
    });
  });
}

// 依單字字串找到並切換收藏
function toggleStarByWord(word) {
  const idx = vocabs.findIndex(v => v.word === word);
  if (idx === -1) return;
  vocabs[idx].favorite = !vocabs[idx].favorite;
  save();
}

// 依單字刪除
function deleteByWord(word) {
  if (!confirm("刪除這個單字嗎？")) return;
  const idx = vocabs.findIndex(v => v.word === word);
  if (idx === -1) return;
  vocabs.splice(idx, 1);
  save();
}

// ====== 7. 其他功能 ======
function speak(text, rate) {
  if (!text) return;
  window.speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = 'en-US';
  msg.rate = rate;
  window.speechSynthesis.speak(msg);
}
function manualAdd() {
  const word = prompt("單字:"); if (!word) return;
  const pos = prompt("詞性 (n./v./adj.):");
  const chinese = prompt("中文:");
  const exampleEn = prompt("英文例句:");
  const exampleCh = prompt("中文翻譯:");
  vocabs.unshift({ word, pos, chinese, exampleEn, exampleCh, favorite: false });
  save();
}
function resetData() {
  if (confirm(`要還原 Unit ${currentUnit} 為預設單字嗎？（你在這個單元新增、刪除、收藏的紀錄會清除）`)) {
    vocabs = [...(unitDefaults[currentUnit] || [])];
    // 離開抽考模式
    quizMode = false;
    quizList = [];
    document.getElementById('quizInfo').style.display = 'none';
    save();
  }
}

// ====== 初始化 ======
initUnitSelect();
render();
</script>
</body>
</html>
