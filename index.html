<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC必考單字與片語</title>
    <style>
        :root { --primary: #2563eb; --star: #f1c40f; --bg: #f1f5f9; --text: #1e293b; }
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 12px; }
        .container { max-width: 1250px; margin: auto; background: white; padding: 18px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .header h1 { font-size: 20px; margin: 0; }
        .top-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; font-size: 13px; color: #64748b; }
        .unit-select-row { display: flex; align-items: center; gap: 6px; }
        .unit-select-row select { padding: 6px 8px; border-radius: 999px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 13px; color: #334155; }
        .range-controls { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #64748b; }
        .range-controls input { width: 52px; padding: 3px 5px; border-radius: 6px; border: 1px solid #e2e8f0; font-size: 11px; }
        .btn { padding: 6px 12px; border: none; border-radius: 999px; cursor: pointer; font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 4px; font-size: 12px; white-space: nowrap; }
        .btn-quiz { background-color: #f97316; color: white; }
        .controls { display: flex; gap: 8px; width: 100%; margin-top: 6px; flex-wrap: wrap; }
        input#searchInput { flex-grow: 1; min-width: 160px; padding: 8px 10px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; font-size: 13px; }
        .btn-filter { background-color: white; border: 2px solid #e2e8f0; color: #64748b; }
        .btn-filter.active { background-color: var(--star); color: #856404; border-color: #f1c40f; }
        .btn-reset { background-color: #fee2e2; color: #ef4444; }
        .btn-hide { background-color: #e0f2fe; color: #0369a1; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th { background-color: #f8fafc; padding: 8px 6px; text-align: left; border-bottom: 2px solid #e2e8f0; color: #64748b; }
        td { padding: 8px 6px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
        .word-text { font-weight: 800; color: #2563eb; font-size: 1.05rem; }
        .star-icon { cursor: pointer; color: #cbd5e1; font-size: 1.2rem; }
        .star-icon.active { color: var(--star); }
        .pos-tag { padding: 1px 4px; border-radius: 4px; font-size: 0.7rem; color: white; background: #94a3b8; font-weight: bold; }
        .pos-n { background: #f59e0b; }
        .pos-v { background: #3b82f6; }
        .pos-adj { background: #10b981; }
        .audio-btn { background: #f1f5f9; border: none; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; color: #2563eb; margin-right: 4px; }
        .example-ch { color: #94a3b8; font-size: 0.85rem; display: block; margin-top: 4px; }
        .hidden-text { background: #cbd5e1 !important; color: transparent !important; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .hidden-text:hover { background: #adb5bd !important; }
        .quiz-badge { background: #ffedd5; color: #c05621; padding: 2px 5px; border-radius: 4px; font-size: 10px; }
        #backToTopBtn { position: fixed; right: 20px; bottom: 20px; display: none; background: var(--primary); color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 20px; z-index: 1000; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>TOEIC必考單字與片語</h1>
        <div class="top-row">
            <div class="unit-select-row">
                <span>課程：</span>
                <select id="unitSelect" onchange="switchUnitSelect()"></select>
                <span id="quizInfo" style="display:none;" class="quiz-badge">隨機排序中</span>
            </div>
            <div class="range-controls">
                <span>顯示第</span>
                <input type="number" id="rangeStart" placeholder="" onchange="render()">
                <span>到</span>
                <input type="number" id="rangeEnd" placeholder="" onchange="render()">
                <span>筆</span>
            </div>
            <button class="btn btn-quiz" onclick="startRandom()">🎲 隨機</button>
        </div>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="搜尋..." onkeyup="render()">
            <button id="filterBtn" class="btn btn-filter" onclick="toggleFilter()">⭐ 收藏</button>
            <button class="btn btn-reset" onclick="resetData()">還原單元</button>
            <button id="hideWordBtn" class="btn btn-hide" onclick="toggleHideWord()">🙈 單字</button>
            <button id="hideDefBtn" class="btn btn-hide" onclick="toggleHideDef()">🙈 中文/翻譯</button>
        </div>
    </div>
    <table>
        <thead>
            <tr><th width="8%">#</th><th width="20%">單字</th><th width="25%">定義</th><th width="42%">例句</th><th width="5%"></th></tr>
        </thead>
        <tbody id="vocabBody"></tbody>
    </table>
</div>

<button id="backToTopBtn" onclick="scrollToTop()">↑</button>

<script>
// 請在此處貼回你的單字資料庫
const unitDefaults = {
    1: [],
    2: [{ word: "a bachelor's degree", pos: "n.", chinese: "學士學位", exampleEn: "This job requires at least a bachelor's degree in business.", exampleCh: "這份工作要求至少有商學學士學位。", favorite: false },
        { word: "a degree", pos: "n.", chinese: "部分地；在某種程度上", exampleEn: "She's got a bachelor's/master's degree in history from Yale.", exampleCh: "她獲得了耶魯大學歷史專業的學士/碩士學位。", favorite: false },
        { word: "a doctoral degree", pos: "n.", chinese: "博士學位", exampleEn: "She has a doctorate in physics from Norwich.", exampleCh: "她獲得了諾里奇大學的物理學博士學位。", favorite: false },
        { word: "a master's degree", pos: "n.", chinese: "碩士學位", exampleEn: "An MA and an MSc are both Master's degrees.", exampleCh: "MA (文學碩士學位) 和 MSc (理學碩士學位) 都是碩士學位。", favorite: false },
        { word: "accept", pos: "v.", chinese: "接受；收受；領受", exampleEn: "I accept full responsibility for the failure of the plan.", exampleCh: "我承擔這項計畫失敗的全部責任。", favorite: false },
        { word: "acceptance", pos: "n.", chinese: "認可，接納", exampleEn: "The idea rapidly gained acceptance in political circles.", exampleCh: "這個想法很快就得到了政界的認同。", favorite: false },
        { word: "accomplish", pos: "v.", chinese: "完成；實現；達到；做到", exampleEn: "The students accomplished the task in less than ten minutes.", exampleCh: "學生不到十分鐘就完成了任務。", favorite: false },
        { word: "accomplishment", pos: "n.", chinese: "成就；完成；實現", exampleEn: "Getting the two leaders to sign a peace treaty was his greatest accomplishment.", exampleCh: "使兩位領導人簽署和平協議是他最大的成就。", favorite: false },
        { word: "achieve", pos: "v.", chinese: "完成，達到，實現", exampleEn: "She finally achieved her ambition to visit South America.", exampleCh: "她終於實現了去南美洲旅遊的夢想。", favorite: false },
        { word: "achievement", pos: "n.", chinese: "成就；成績；功績", exampleEn: "An Olympic silver medal is a remarkable achievement for one so young.", exampleCh: "對於如此年輕的選手而言，奪得奧運銀牌是個了不起的成就。", favorite: false },
        { word: "acquaint", pos: "v.", chinese: "使認識；使瞭解；使熟悉", exampleEn: "Take time to acquaint yourself with the rules.", exampleCh: "花點時間熟悉一下規則。", favorite: false },
        { word: "acquaintance", pos: "n.", chinese: "相識的人，熟人；認識", exampleEn: "It was at the Taylors' party that I first made his acquaintance.", exampleCh: "我是在泰勒家的聚會上初次和他相識的。", favorite: false },
        { word: "acquainted", pos: "adj.", chinese: "相識的；認識的；熟悉的", exampleEn: "I am not personally acquainted with the gentleman in question.", exampleCh: "我本人和所說的這位先生並不相識。", favorite: false },
        { word: "administration", pos: "n.", chinese: "管理；經營；行政", exampleEn: "Teachers complain that more of their time is taken up with administration than with teaching.", exampleCh: "教師抱怨他們花在行政工作上的時間超過了教學的時間。", favorite: false },
        { word: "administrative", pos: "adj.", chinese: "管理的；行政的", exampleEn: "Your responsibilities will be mainly administrative.", exampleCh: "你的職責主要是在行政方面。", favorite: false },
        { word: "administrator", pos: "n.", chinese: "管理人員，行政人員", exampleEn: "She works as a school administrator.", exampleCh: "她是學校的一名行政人員。", favorite: false },
        { word: "amateur", pos: "adj.", chinese: "業餘愛好的，非職業的", exampleEn: "He was an amateur singer until the age of 40 when he turned professional.", exampleCh: "40歲之前他一直個業餘歌手，之後才轉為職業歌手。", favorite: false },
        { word: "anonymous", pos: "adj.", chinese: "匿名的；不知姓名的", exampleEn: "The money was donated by an anonymous benefactor.", exampleCh: "這筆錢來自一位不願透露姓名的捐贈者。", favorite: false },
        { word: "applicant", pos: "n.", chinese: "申請人", exampleEn: "How many applicants did you have for the job?", exampleCh: "申請這份工作的有多少人？", favorite: false },
        { word: "application", pos: "n.", chinese: "申請，請求；應用軟體", exampleEn: "I've sent off applications for four different jobs.", exampleCh: "我投寄申請四份不同工作的求職信。", favorite: false },
        { word: "apply", pos: "v.", chinese: "申請，請求", exampleEn: "By the time I saw the job advertised it was already too late to apply.", exampleCh: "我看見招聘廣告的時候，已經太晚了，錯過了應徵時機。", favorite: false },
        { word: "appoint", pos: "v.", chinese: "任命；委任", exampleEn: "He's just been appointed (as) director of the publishing division.", exampleCh: "他剛剛被任命為出版部主任。", favorite: false },]
};

let currentUnit = 1;
let vocabs = [];
let randomOrder = []; // 存儲隨機排序後的索引
let isRandomMode = false;
let onlyShowFavorites = false;
let hideWord = false;
let hideDef = false;

function loadUnitData(unit) {
    const saved = localStorage.getItem(`toeic_unit_${unit}`);
    return saved ? JSON.parse(saved) : [...(unitDefaults[unit] || [])];
}

function save() {
    localStorage.setItem(`toeic_unit_${currentUnit}`, JSON.stringify(vocabs));
    render();
}

function initUnitSelect() {
    const select = document.getElementById('unitSelect');
    select.innerHTML = Object.keys(unitDefaults).map(i => `<option value="${i}">Unit ${i}</option>`).join('');
    vocabs = loadUnitData(currentUnit);
}

function switchUnitSelect() {
    currentUnit = parseInt(document.getElementById('unitSelect').value);
    vocabs = loadUnitData(currentUnit);
    isRandomMode = false;
    document.getElementById('quizInfo').style.display = 'none';
    render();
}

// 核心隨機邏輯：根據目前的顯示範圍進行隨機排序
function startRandom() {
    const total = vocabs.length;
    if (!total) return;

    // 取得當前設定的範圍
    const startVal = document.getElementById('rangeStart').value;
    const endVal = document.getElementById('rangeEnd').value;
    const start = startVal === "" ? 1 : parseInt(startVal);
    const end = endVal === "" ? total : parseInt(endVal);

    // 修正有效索引
    const sIdx = Math.max(0, start - 1);
    const eIdx = Math.min(total, end);

    // 建立範圍內的索引陣列
    const indices = [];
    for (let i = sIdx; i < eIdx; i++) {
        indices.push(i);
    }

    // 進行洗牌
    randomOrder = indices.sort(() => Math.random() - 0.5);
    isRandomMode = true;
    document.getElementById('quizInfo').style.display = 'inline';
    render();
}

function render() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const body = document.getElementById('vocabBody');
    
    let displayIndices = [];

    if (isRandomMode) {
        // 隨機模式下直接使用洗好的索引
        displayIndices = randomOrder;
    } else {
        // 一般模式：處理搜尋、收藏過濾
        const startVal = document.getElementById('rangeStart').value;
        const endVal = document.getElementById('rangeEnd').value;
        const start = startVal === "" ? 1 : parseInt(startVal);
        const end = endVal === "" ? 999 : parseInt(endVal);

        const filtered = vocabs.map((v, i) => ({ ...v, _index: i }))
            .filter(v => (v.word.toLowerCase().includes(query) || v.chinese.includes(query)) && (onlyShowFavorites ? v.favorite : true));
        
        displayIndices = filtered.slice(start - 1, end).map(v => v._index);
    }

    body.innerHTML = displayIndices.map((origIdx, viewIdx) => {
        const item = vocabs[origIdx];
        const posKey = item.pos ? item.pos.replace('.', '').replace('/', '').toLowerCase() : 'adj';
        
        return `
            <tr>
                <td>${origIdx + 1} ${isRandomMode ? '<span class="quiz-badge">R</span>' : ''}</td>
                <td>
                    <span class="star-icon ${item.favorite ? 'active' : ''}" onclick="toggleStar(${origIdx})">★</span>
                    <button class="audio-btn" onclick="speak('${item.word.replace(/'/g, "\\'")}', 0.8)">🔊</button>
                    <span class="${hideWord ? 'hidden-text' : 'word-text'}" onclick="this.classList.toggle('hidden-text')">${item.word}</span>
                </td>
                <td>
                    <span class="pos-tag pos-${posKey}">${item.pos}</span>
                    <span class="${hideDef ? 'hidden-text' : ''}" onclick="this.classList.toggle('hidden-text')">${item.chinese}</span>
                </td>
                <td>
                    <div class="example-en">${item.exampleEn}</div>
                    <div class="${hideDef ? 'hidden-text' : 'example-ch'}" onclick="this.classList.toggle('hidden-text')">${item.exampleCh}</div>
                </td>
                <td><button style="border:none; background:none; cursor:pointer;" onclick="deleteWord(${origIdx})">🗑️</button></td>
            </tr>
        `;
    }).join('');
}

function toggleStar(idx) { vocabs[idx].favorite = !vocabs[idx].favorite; save(); }
function deleteWord(idx) { if(confirm("確定刪除？")) { vocabs.splice(idx, 1); save(); } }
function toggleFilter() { onlyShowFavorites = !onlyShowFavorites; document.getElementById('filterBtn').classList.toggle('active'); render(); }
function toggleHideWord() { hideWord = !hideWord; render(); }
function toggleHideDef() { hideDef = !hideDef; render(); }

function resetData() { 
    if(confirm("確定還原預設？所有紀錄會消失")) { 
        vocabs = [...unitDefaults[currentUnit]]; 
        isRandomMode = false; 
        document.getElementById('quizInfo').style.display='none'; 
        save(); 
    } 
}

function speak(t, r) { 
    window.speechSynthesis.cancel(); 
    const m = new SpeechSynthesisUtterance(t); 
    m.rate = r; 
    window.speechSynthesis.speak(m); 
}

// 置頂功能邏輯
window.onscroll = function() {
    const btn = document.getElementById("backToTopBtn");
    if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
        btn.style.display = "block";
    } else {
        btn.style.display = "none";
    }
};
function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

initUnitSelect();
render();
</script>
</body>
</html>
