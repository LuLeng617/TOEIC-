<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC必考單字與片語</title>
<style>
:root {
  --primary: #2563eb;
  --star: #f1c40f;
  --bg: #f1f5f9;
  --text: #1e293b;
}
body {
  font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
  background-color: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 12px;
}
.container {
  max-width: 1250px;
  margin: auto;
  background: white;
  padding: 18px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* 頂部控制區 */
.header {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 10px;
}
.header h1 {
  font-size: 20px;
  margin: 0;
}

/* 第一排：課程 + 範圍 + 抽考 */
.top-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: #64748b;
}
.unit-select-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.unit-select-row select {
  padding: 6px 8px;
  border-radius: 999px;
  border: 1px solid #e2e8f0;
  background: #f8fafc;
  font-size: 13px;
  color: #334155;
}
.range-controls {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: #64748b;
}
.range-controls input {
  width: 52px;
  padding: 3px 5px;
  border-radius: 6px;
  border: 1px solid #e2e8f0;
  font-size: 11px;
}
.btn {
  padding: 6px 10px;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  white-space: nowrap;
}
.btn-quiz {
  background-color: #f97316;
  color: white;
}

/* 第二排：搜尋 + 收藏 + 還原 + 隱藏 */
.controls {
  display: flex;
  gap: 8px;
  width: 100%;
  margin-top: 6px;
  flex-wrap: wrap;
}
input#searchInput {
  flex-grow: 1;
  min-width: 160px;
  padding: 8px 10px;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  outline: none;
  transition: 0.3s;
  font-size: 13px;
}
input#searchInput:focus {
  border-color: var(--primary);
}
.btn-filter {
  background-color: white;
  border: 2px solid #e2e8f0;
  color: #64748b;
}
.btn-filter.active {
  background-color: var(--star);
  color: #856404;
  border-color: #f1c40f;
}
.btn-reset {
  background-color: #fee2e2;
  color: #ef4444;
}
.btn-hide {
  background-color: #e0f2fe;
  color: #0369a1;
}

/* 表格樣式：縮小高度 */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th {
  background-color: #f8fafc;
  padding: 8px 6px;
  text-align: left;
  border-bottom: 2px solid #e2e8f0;
  color: #64748b;
}
td {
  padding: 6px 6px;
  border-bottom: 1px solid #f1f5f9;
  vertical-align: top;
}
tr:hover {
  background-color: #fdfdfd;
}

/* 單字與收藏：縮小間距 */
.word-box {
  display: flex;
  align-items: center;
  gap: 6px;
}
.star-icon {
  cursor: pointer;
  font-size: 1.1rem;
  color: #cbd5e1;
  transition: 0.2s;
  user-select: none;
}
.star-icon.active {
  color: var(--star);
}
.word-text {
  font-weight: 800;
  color: #2563eb;
  font-size: 1.05rem;
}

/* 詞性 + 中文定義同一塊，減少高度 */
.word-meta {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
}
.pos-tag {
  padding: 1px 4px;
  border-radius: 4px;
  font-size: 0.7rem;
  color: white;
  background: #94a3b8;
  font-weight: bold;
}
.pos-n { background: #f59e0b; }
.pos-v { background: #3b82f6; }
.pos-a { background: #10b981; }

/* 發音按鈕縮小 */
.audio-btn {
  background: #f1f5f9;
  border: none;
  border-radius: 50%;
  width: 26px;
  height: 26px;
  cursor: pointer;
  color: #2563eb;
  font-size: 0.8rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.audio-btn:hover {
  background: #2563eb;
  color: white;
}

/* 例句區：更緊湊 */
.examples-box {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.example-en {
  font-style: italic;
  color: #475569;
  display: block;
  cursor: pointer;
}
.example-ch {
  color: #94a3b8;
  font-size: 0.85rem;
  display: block;
  cursor: pointer;
}

/* 遮住文字 */
.hidden-text {
  background: #cbd5e1;
  color: #cbd5e1;
  border-radius: 4px;
  padding: 0 3px;
}
.hidden-text.reveal {
  color: inherit;
}

/* 手機：每個單字變成卡片，但高度壓縮 */
@media (max-width: 900px) {
  .container {
    padding: 12px;
  }
  th:nth-child(2),
  th:nth-child(3) {
    display: none;
  }
  table, thead {
    display: block;
  }
  tr {
    display: block;
    border-bottom: 4px solid #f1f5f9;
    padding: 6px 0;
  }
  td {
    display: block;
    border: none;
    padding: 2px 0;
  }
  td:nth-child(1) {
    font-size: 12px;
    color: #94a3b8;
  }
}

/* 抽考模式提示 */
.quiz-badge {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 999px;
  background: #ffedd5;
  color: #c05621;
  font-size: 10px;
  margin-left: 4px;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>TOEIC必考單字與片語</h1>

    <!-- 第一排：課程 + 範圍 + 抽考 -->
    <div class="top-row">
      <div class="unit-select-row">
        <span>課程：</span>
        <select id="unitSelect" onchange="switchUnitSelect()"></select>
        <span id="quizInfo" style="font-size:11px; color:#f97316; display:none;">
          抽考中
        </span>
      </div>

      <div class="range-controls">
        <span>顯示第</span>
        <input type="number" id="rangeStart" min="1" value=" " onchange="render()">
        <span>到</span>
        <input type="number" id="rangeEnd" min="1" value=" " onchange="render()">
        <span>筆</span>
      </div>

      <button class="btn btn-quiz" onclick="startQuiz()">🎲 隨機</button>
    </div>

    <!-- 第二排：搜尋 + 收藏 + 還原 + 隱藏 -->
    <div class="controls">
      <input type="text" id="searchInput" placeholder="搜尋單字、中文..." onkeyup="render()">
      <button id="filterBtn" class="btn btn-filter" onclick="toggleFilter()">⭐ 收藏</button>
      <button class="btn btn-reset" onclick="resetData()">還原單元</button>
      <button id="hideWordBtn" class="btn btn-hide" onclick="toggleHideWord()">🙈 單字</button>
      <button id="hideDefBtn" class="btn btn-hide" onclick="toggleHideDef()">🙈 中文</button>
      <button id="hideChBtn" class="btn btn-hide" onclick="toggleHideCh()">🙈 中例句</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th width="6%">#</th>
        <th width="17%">單字</th>
        <th width="10%">詞性</th>
        <th width="20%">中文定義</th>
        <th width="42%">例句 (中英對照)</th>
        <th width="5%"></th>
      </tr>
    </thead>
    <tbody id="vocabBody"></tbody>
  </table>
</div>

// ====== 2. 狀態 & localStorage ======
let currentUnit = 1;
let vocabs = loadUnitData(currentUnit);
let onlyShowFavorites = false;
let hideWord = false;
let hideDef = false;
let hideChinese = false;

// 抽考模式
let quizMode = false;
let quizList = [];

function unitKey(unit) {
  return `myVocabDB_v4_unit_${unit}`;
}
function loadUnitData(unit) {
  const key = unitKey(unit);
  const saved = localStorage.getItem(key);
  if (saved) {
    try {
      return JSON.parse(saved);
    } catch (e) {
      return [...(unitDefaults[unit] || [])];
    }
  }
  return [...(unitDefaults[unit] || [])];
}
function save() {
  const key = unitKey(currentUnit);
  localStorage.setItem(key, JSON.stringify(vocabs));
  render();
}

// ====== 3. 課程下拉式選單 UI ======
const unitSelect = document.getElementById('unitSelect');
function initUnitSelect() {
  let html = '';
  for (let i = 1; i <= 13; i++) {
    html += `<option value="${i}">Unit ${i}</option>`;
  }
  unitSelect.innerHTML = html;
  unitSelect.value = String(currentUnit);
}
function switchUnitSelect() {
  const unit = parseInt(unitSelect.value, 10);
  if (unit === currentUnit) return;
  currentUnit = unit;
  vocabs = loadUnitData(currentUnit);
  onlyShowFavorites = false;
  document.getElementById('filterBtn').classList.remove('active');
  document.getElementById('filterBtn').textContent = "⭐ 收藏";
  document.getElementById('rangeStart').value = 1;
  document.getElementById('rangeEnd').value = 999;
  // 離開抽考模式
  quizMode = false;
  quizList = [];
  document.getElementById('quizInfo').style.display = 'none';
  render();
}

// ====== 4. 控制按鈕 ======
function toggleFilter() {
  onlyShowFavorites = !onlyShowFavorites;
  const btn = document.getElementById('filterBtn');
  if (onlyShowFavorites) {
    btn.classList.add('active');
    btn.textContent = "★ 收藏中";
  } else {
    btn.classList.remove('active');
    btn.textContent = "⭐ 收藏";
  }
  render();
}
function toggleHideWord() {
  hideWord = !hideWord;
  const btn = document.getElementById('hideWordBtn');
  btn.textContent = hideWord ? "👀 單字" : "🙈 單字";
  render();
}
function toggleHideDef() {
  hideDef = !hideDef;
  const btn = document.getElementById('hideDefBtn');
  btn.textContent = hideDef ? "👀 中文" : "🙈 中文";
  render();
}
function toggleHideCh() {
  hideChinese = !hideChinese;
  const btn = document.getElementById('hideChBtn');
  btn.textContent = hideChinese ? "👀 中例句" : "🙈 中例句";
  render();
}

// ====== 5. 抽考模式 ======
function startQuiz() {
  const total = vocabs.length;
  if (!total) {
    alert("這個單元還沒有單字。");
    return;
  }
  let n = prompt(`要抽幾題？（1～${total}）`, "10");
  if (!n) return;
  n = parseInt(n, 10);
  if (isNaN(n) || n <= 0) return;
  if (n > total) n = total;

  const allIndex = [...Array(total).keys()];
  for (let i = allIndex.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allIndex[i], allIndex[j]] = [allIndex[j], allIndex[i]];
  }
  quizList = allIndex.slice(0, n);
  quizMode = true;
  document.getElementById('quizInfo').style.display = 'inline';
  document.getElementById('rangeStart').value = 1;
  document.getElementById('rangeEnd').value = 999;
  render();
}

// ====== 6. 渲染表格 ======
function render() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const body = document.getElementById('vocabBody');
  const rangeStart = parseInt(document.getElementById('rangeStart').value || '1', 10);
  const rangeEnd = parseInt(document.getElementById('rangeEnd').value || '999', 10);

  let filtered = vocabs
    .map((v, i) => ({ ...v, _index: i }))
    .filter((v) => {
      const matchesSearch =
        v.word.toLowerCase().includes(query) ||
        (v.chinese || "").includes(query);
      const matchesFilter = onlyShowFavorites ? v.favorite : true;
      return matchesSearch && matchesFilter;
    });

  if (quizMode && quizList.length) {
    const set = new Set(quizList);
    filtered = filtered.filter(v => set.has(v._index));
  }

  const total = filtered.length;
  const startIndex = Math.max(1, rangeStart);
  const endIndex = Math.min(rangeEnd, total);
  const sliced = filtered.slice(startIndex - 1, endIndex);

  body.innerHTML = sliced.map((item, idx) => {
    const globalIndex = startIndex + idx;
    const posClass = item.pos ? `pos-${item.pos.charAt(0).toLowerCase()}` : 'pos-a';

    const wordContent = hideWord
      ? `<span class="word-text hidden-text" data-full="${item.word}">點一下顯示</span>`
      : `<span class="word-text" data-full="${item.word}">${item.word}</span>`;

    const defContent = hideDef
      ? `<span class="hidden-text" data-full="${item.chinese || ''}">點一下顯示</span>`
      : `<span data-full="${item.chinese || ''}">${item.chinese || ''}</span>`;

    const chText = hideChinese
      ? `<span class="example-ch hidden-text" data-full="${item.exampleCh || ''}">點一下顯示中例句</span>`
      : `<span class="example-ch" data-full="${item.exampleCh || ''}">${item.exampleCh || ''}</span>`;

    const enText = `<span class="example-en" data-full="${item.exampleEn || ''}">${item.exampleEn || ''}</span>`;

    const safeWord = (item.word || '').replace(/'/g, "\\'");
    const safeExampleEn = (item.exampleEn || '').replace(/'/g, "\\'");

    const quizBadge = quizMode ? `<span class="quiz-badge">Quiz</span>` : "";

    return `
      <tr>
        <td>${globalIndex}${quizBadge}</td>
        <td>
          <div class="word-box">
            <span class="star-icon ${item.favorite ? 'active' : ''}" onclick="toggleStarByWord('${safeWord}')">★</span>
            <button class="audio-btn" onclick="speak('${safeWord}', 0.8)">🔊</button>
            ${wordContent}
          </div>
        </td>
        <td colspan="2">
          <div class="word-meta">
            <span class="pos-tag ${posClass}">${item.pos || ''}</span>
            ${defContent}
          </div>
        </td>
        <td>
          <div style="display:flex; gap:6px; align-items:flex-start;">
            <button class="audio-btn" onclick="speak('${safeExampleEn}', 0.9)">🔊</button>
            <div class="examples-box">
              ${enText}
              ${chText}
            </div>
          </div>
        </td>
        <td>
          <button style="border:none; background:none; cursor:pointer; color:#d1d5db;" onclick="deleteByWord('${safeWord}')">🗑️</button>
        </td>
      </tr>
    `;
  }).join('');

  body.querySelectorAll('.hidden-text, .word-text, td span, .example-en, .example-ch').forEach(span => {
    const hasData = span.getAttribute('data-full') !== null;
    if (!hasData) return;
    span.addEventListener('click', () => {
      const full = span.getAttribute('data-full') || '';
      if (span.classList.contains('hidden-text')) {
        span.classList.remove('hidden-text');
        span.classList.add('reveal');
        span.textContent = full;
      } else if (span.classList.contains('reveal')) {
        span.classList.add('hidden-text');
        span.classList.remove('reveal');
        if (span.classList.contains('example-ch')) {
          span.textContent = '點一下顯示中例句';
        } else if (span.closest('td') && span.closest('td').cellIndex === 1) {
          span.textContent = '點一下顯示';
        } else {
          span.textContent = '點一下顯示';
        }
      }
    });
  });
}

function toggleStarByWord(word) {
  const idx = vocabs.findIndex(v => v.word === word);
  if (idx === -1) return;
  vocabs[idx].favorite = !vocabs[idx].favorite;
  save();
}

function deleteByWord(word) {
  if (!confirm("刪除這個單字嗎？")) return;
  const idx = vocabs.findIndex(v => v.word === word);
  if (idx === -1) return;
  vocabs.splice(idx, 1);
  save();
}

// ====== 7. 其他功能（已移除 manualAdd） ======
function speak(text, rate) {
  if (!text) return;
  window.speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = 'en-US';
  msg.rate = rate;
  window.speechSynthesis.speak(msg);
}
function resetData() {
  if (confirm(`要還原 Unit ${currentUnit} 為預設單字嗎？（你在這個單元新增、刪除、收藏的紀錄會清除）`)) {
    vocabs = [...(unitDefaults[currentUnit] || [])];
    quizMode = false;
    quizList = [];
    document.getElementById('quizInfo').style.display = 'none';
    save();
  }
}

// ====== 初始化 ======
initUnitSelect();
render();
</script>
