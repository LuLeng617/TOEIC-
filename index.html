    <style>

        .container { max-width: 1250px; margin: auto; background: white; padding: 18px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .header h1 { font-size: 20px; margin: 0; }
        .top-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; font-size: 13px; color: #64748b; }
        .unit-select-row { display: flex; align-items: center; gap: 6px; }
        .unit-select-row select { padding: 6px 8px; border-radius: 999px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 13px; color: #334155; }
        .range-controls { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #64748b; }
        .range-controls input { width: 52px; padding: 3px 5px; border-radius: 6px; border: 1px solid #e2e8f0; font-size: 11px; }
        .btn { padding: 6px 12px; border: none; border-radius: 999px; cursor: pointer; font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 4px; font-size: 12px; white-space: nowrap; }
        .btn-quiz { background-color: #f97316; color: white; }
        .controls { display: flex; gap: 8px; width: 100%; margin-top: 6px; flex-wrap: wrap; }
        input#searchInput { flex-grow: 1; min-width: 160px; padding: 8px 10px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; font-size: 13px; }
        .btn-filter { background-color: white; border: 2px solid #e2e8f0; color: #64748b; }
        .btn-filter.active { background-color: var(--star); color: #856404; border-color: #f1c40f; }
        .btn-reset { background-color: #fee2e2; color: #ef4444; }
        .btn-hide { background-color: #e0f2fe; color: #0369a1; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th { background-color: #f8fafc; padding: 8px 6px; text-align: left; border-bottom: 2px solid #e2e8f0; color: #64748b; }
        td { padding: 8px 6px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
        .word-text { font-weight: 800; color: #2563eb; font-size: 1.05rem; }
        .star-icon { cursor: pointer; color: #cbd5e1; font-size: 1.2rem; }
        .star-icon.active { color: var(--star); }
        .pos-tag { padding: 1px 4px; border-radius: 4px; font-size: 0.7rem; color: white; background: #94a3b8; font-weight: bold; }
        .pos-n { background: #f59e0b; }
        .pos-v { background: #3b82f6; }
        .pos-adj { background: #10b981; }
        .audio-btn { background: #f1f5f9; border: none; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; color: #2563eb; margin-right: 4px; }
        .example-ch { color: #94a3b8; font-size: 0.85rem; display: block; margin-top: 4px; }
        .hidden-text { background: #cbd5e1 !important; color: transparent !important; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .hidden-text:hover { background: #adb5bd !important; }
        .quiz-badge { background: #ffedd5; color: #c05621; padding: 2px 5px; border-radius: 4px; font-size: 10px; margin-left: 4px; }
        #backToTopBtn { position: fixed; right: 20px; bottom: 20px; display: none; background: var(--primary); color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 20px; z-index: 1000; text-align: center; line-height: 45px; }

	<style>
  /* 手機版自動轉卡片 */
  @media (max-width: 600px) {
    table, thead, tbody, th, td, tr { 
      display: block; 
    }
    thead tr { position: absolute; top: -9999px; left: -9999px; }
    tr { border: 1px solid #ccc; margin-bottom: 10px; border-radius: 8px; padding: 10px; background: #fff; }

    .word-text { font-size: 1.2rem; color: #2563eb; display: block; }
  }
  
  /* 遮罩效果 */
  .hidden-text {

    color: transparent !important;
    cursor: pointer;
    border-radius: 4px;

  }

        </thead>
        <tbody id="vocabBody"></tbody>
    </table>
</div>

let currentUnit = 1;
let vocabs = [];
let quizMode = false;
let quizList = [];
let onlyShowFavorites = false;
let hideWord = false;
let hideDef = false;

function loadUnitData(unit) {
    const saved = localStorage.getItem(`toeic_unit_${unit}`);
    return saved ? JSON.parse(saved) : [...(unitDefaults[unit] || [])];
}

function save() {
    localStorage.setItem(`toeic_unit_${currentUnit}`, JSON.stringify(vocabs));
    render();
}

function initUnitSelect() {
    const select = document.getElementById('unitSelect');
    select.innerHTML = Object.keys(unitDefaults)
        .map(i => `<option value="${i}">Unit ${i}</option>`).join('');
    vocabs = loadUnitData(currentUnit);
}

function switchUnitSelect() {
    currentUnit = parseInt(document.getElementById('unitSelect').value, 10);
    vocabs = loadUnitData(currentUnit);
    quizMode = false;
    document.getElementById('quizInfo').style.display = 'none';
    document.getElementById('rangeStart').value = "";
    document.getElementById('rangeEnd').value = "";
    render();
}

// 抽考功能
function startQuiz() {
    // 取得目前搜尋與範圍的參數
    const query = document.getElementById('searchInput').value.toLowerCase();
    const startInput = document.getElementById('rangeStart').value;
    const endInput = document.getElementById('rangeEnd').value;
    
    const start = startInput === "" ? 1 : Math.max(1, parseInt(startInput, 10));
    const end = endInput === "" ? vocabs.length : Math.min(vocabs.length, parseInt(endInput, 10));

    // 找出目前「過濾後且在範圍內」的原始索引
    let currentVisibleIndices = vocabs
        .map((v, i) => ({ ...v, _index: i }))
        .filter(v =>
            (v.word.toLowerCase().includes(query) || (v.chinese || "").includes(query)) &&
            (onlyShowFavorites ? v.favorite : true)
        )
        .slice(start - 1, end)
        .map(v => v._index);

    if (currentVisibleIndices.length === 0) {
        alert("目前畫面沒有單字可以隨機！");
        return;
    }

    // 直接打亂這些索引
    quizList = currentVisibleIndices.sort(() => Math.random() - 0.5);
    quizMode = true;
    
    // 自動開啟「隱藏單字」與「隱藏中文」功能（抽考模式通常需要遮住答案）
    hideWord = true;
    hideDef = true;

    document.getElementById('quizInfo').style.display = 'inline';
    render();
}

// 🔥 修正後的渲染邏輯
function render() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const body = document.getElementById('vocabBody');
    
    const startInput = document.getElementById('rangeStart').value;
    const endInput = document.getElementById('rangeEnd').value;

    let displayList = [];

    if (quizMode) {
        // 【隨機模式】：直接依照打亂後的索引清單來顯示
        displayList = quizList.map(originalIdx => ({
            ...vocabs[originalIdx],
            _index: originalIdx
        }));
    } else {
        // 【一般模式】：先過濾搜尋/收藏，再根據範圍切片
        const start = startInput === "" ? 1 : Math.max(1, parseInt(startInput, 10));
        const end = endInput === "" ? vocabs.length : Math.min(vocabs.length, parseInt(endInput, 10));

        let filtered = vocabs
            .map((v, i) => ({ ...v, _index: i }))
            .filter(v =>
                (v.word.toLowerCase().includes(query) || (v.chinese || "").includes(query)) &&
                (onlyShowFavorites ? v.favorite : true)
            );
        
        displayList = filtered.slice(start - 1, end);
    }

    // 渲染表格內容
    body.innerHTML = displayList.map((item, idx) => {
        const posKey = item.pos.replace('.', '').replace('/', '').toLowerCase();
        
        // 根據開關狀態決定是否隱藏
		const wordCellClass = hideWord ? 'hidden-text' : 'word-text';
        const defHiddenClass = hideDef ? 'hidden-text' : '';
        const chHiddenClass = hideDef ? 'hidden-text' : 'example-ch';

        return `
            <tr>
                <td>${item._index + 1}</td>
                <td>
                    <span class="star-icon ${item.favorite ? 'active' : ''}" onclick="toggleStar(${item._index})">★</span>
                    <button class="audio-btn" onclick="speak('${item.word.replace(/'/g, "\\'")}', 0.8)">🔊</button>
                    <span class="${wordCellClass}" onclick="this.classList.toggle('hidden-text')">${item.word}</span>
                </td>
                <td>
                    <span class="pos-tag pos-${posKey}">${item.pos}</span>
                    <span class="${defHiddenClass}" onclick="this.classList.toggle('hidden-text')">${item.chinese}</span>
                </td>
                <td>
                    <div class="example-en">${item.exampleEn}</div>
                    <div class="${chHiddenClass}" onclick="this.classList.toggle('hidden-text')">${item.exampleCh}</div>
                </td>
            </tr>
        `;
    }).join('');
}
		
// 收藏 / 刪除 / 篩選 / 隱藏
function toggleStar(idx) {
  vocabs[idx].favorite = !vocabs[idx].favorite;
  save();
}
function deleteWord(idx) {
  if (confirm("確定刪除？")) {
    vocabs.splice(idx, 1);
    save();
  }
}
function toggleFilter() {
  onlyShowFavorites = !onlyShowFavorites;
  document.getElementById('filterBtn').classList.toggle('active');
  render();
}
function toggleHideWord() {
  hideWord = !hideWord;
  render();
}
// 隱藏中文時，順便把中文翻譯和中例句一起藏
function toggleHideDef() {
  hideDef = !hideDef;
  render();
}

// 還原單元
function resetData() {
  if (confirm("確定還原預設？")) {
    vocabs = [...unitDefaults[currentUnit]];
    quizMode = false;
    document.getElementById('quizInfo').style.display='none';
    save();
  }
}

// 發音
function speak(t, r) {
  window.speechSynthesis.cancel();
  const m = new SpeechSynthesisUtterance(t);
  m.rate = r;
  window.speechSynthesis.speak(m);
}

// 回到頂部
window.onscroll = function() {
  const btn = document.getElementById("backToTopBtn");
  if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
    btn.style.display = "block";
  } else {
    btn.style.display = "none";
  }
};
function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 初始執行
initUnitSelect();
render();
</script>
